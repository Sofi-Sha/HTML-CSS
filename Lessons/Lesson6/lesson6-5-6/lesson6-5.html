<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Form</title>
    <link rel="stylesheet" href="style-lesson6-5.css">
</head>
<body>
<form class="form-registration">
    <label for="name">Enter your name</label>
    <input  id="name" type="text" name="user_name" required placeholder="Firstname Lastname"><sup>*</sup>

    <label for="email">Enter your email</label>
    <input  id="email" type="email" name="email" required placeholder="example@gmail.com"><sup>*</sup>

    <label for="password">Enter your password</label>
    <input  id="password" type="password" name="password" required placeholder="qwerty"><sup>*</sup>

    <label for="age">Enter your age</label>
    <input  id="age" type="number" name="age" min="18" max="100">

    <label>Gender</label>
    <label><input type="radio" name="gender" value="male">Male</label>
    <label><input type="radio" name="gender" value="female">Female</label>

    <label>
        <input type="checkbox" name="newsletter">Subscribe to news
    </label>

    <label for="country">Country</label>
    <select id="country" name="country">
        <option value="">Choose country</option>
        <option value="australia">Australia</option>
        <option value="canada">Canada</option>
        <option value="usa">USA</option>
        <option value="ua">Ukraine</option>
    </select>

    <label for="phone">Phone</label>
    <select name="phone" id="phone">
        <optgroup label="Apple">
            <option value="">Choose your phone</option>
            <option value="x">IPhone X</option>
            <option value="r">IPhone R</option>
            <option value="xs">IPhone XS</option>
            <option value="xr">IPhone XR</option>
        </optgroup>

        <optgroup label="Samsung">
            <option value="s22">Samsung Galaxy S22</option>
            <option value="s23">Samsung Galaxy S23</option>
            <option value="s24">Samsung Galaxy S24</option>
            <option value="s25">Samsung Galaxy S25</option>
        </optgroup>
    </select>

    <label for="comment"></label>
        <textarea  name="comment" id="comment" rows="7" cols="50"></textarea>
    
    <div>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </div>

</form>
</body>
</html>
