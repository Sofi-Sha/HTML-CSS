<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Instagram | Login</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="stylesheet" href="style6-2.css">
</head>
<body>
<div class="form-login">
    <h2>Instagram</h2>
    <form>
        <input type="text" name="login" placeholder="Номер телефону, ім'я користувача або електронна адреса">
        <input type="password" name="password" placeholder="Пароль">
        <input type="submit" name="submit" value="Увійти">
    </form>
    <div class="form-help">
        <p>АБО</p>
        <div class="social-login">
            <img src="img/facebook.png" alt="facebook icon">
            <a href="#">Увійти через Facebook</a>
        </div>
        <div class="forgot-password">
            <a href="#">Забули пароль?</a>
        </div>

    </div>
</div>

<div class="form-registration">
    <p>Не маєте облікового запису?</p>
    <a href="#">Зареєструйтеся</a>
</div>
</body>
</html>
